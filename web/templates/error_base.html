<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OnePet - {% block titulo %}Error{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Manrope', sans-serif;
            background: #F0F7FF;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #1e2a3a;
        }
        .error-container {
            text-align: center;
            max-width: 500px;
            padding: 40px 20px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            margin: 20px;
        }
        .error-icon {
            font-size: 80px;
            margin-bottom: 20px;
            display: inline-block;
        }
        .error-code {
            font-size: 5rem;
            font-weight: 800;
            color: #2c6e9e;
            margin: 10px 0;
        }
        h2 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: #1e2a3a;
        }
        p {
            color: #4a627a;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }
        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #81E1F3;
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 700;
            transition: opacity 0.2s;
        }
        .btn-home:hover {
            opacity: 0.9;
        }
        .material-symbols-outlined {
            vertical-align: middle;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="error-container">
        {% block contenido %}{% endblock %}
    </div>
</body>
</html>
