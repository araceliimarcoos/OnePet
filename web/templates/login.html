{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OnePet - Iniciar Sesión</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    
    <style>
        /* =====================================================
   login.css – Ajustado para coincidir con la referencia
   ===================================================== */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
    --blue-login:  #81E1F3; /* El celeste del botón y links */
    --text-main:   #333333;
    --text-muted:  #888888;
    --bg-light:    #F0F7FF; /* Fondo de la página */
    --surface:     #ffffff;
    --border:      #EEEEEE;
    --radius-lg:   30px;
    --radius-md:   15px;
}

/* Resetea cualquier estilo de body que venga de styles.css */
body.login-body {
    display: flex !important;
    height: auto !important;
    min-height: 100vh !important;
    overflow: auto !important;
}

body.login-body {
    font-family: 'Manrope', sans-serif;
    display: flex !important;
    height: 100vh !important; /* Altura fija al 100% de la ventana */
    margin: 0;
    padding: 0;
    overflow: hidden !important; /* Elimina el scroll */
    background-color: var(--bg-light);
    align-items: center;
    justify-content: center;
}

.login-card {
    display: flex;
    width: 95%;
    max-width: 1000px;
    max-height: 90vh; /* Que no ocupe más del 90% de la altura de la pantalla */
    background: var(--surface);
    border-radius: var(--radius-lg);
    box-shadow: 0 10px 30px rgba(0,0,0,0.03);
    overflow: hidden;
}

/* PANEL IZQUIERDO: La imagen tiene un margen */
.login-panel-left {
    flex: 1.5;
    padding: 25px; /* Esto crea el efecto de marco blanco alrededor de la foto */
    display:flex;
    
}

.login-photo {
    width: 100%;
    height: 100%;
    object-fit: cover;
    /*border-radius: var(--radius-lg); Bordes redondeados en la foto misma */
    border-radius: calc(var(--radius-lg) - 10px);
}

/* PANEL DERECHO */
.login-panel-right {
    flex: 1;
    padding: 60px 80px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.login-header {
    text-align: center;
    margin-bottom: 30px;
}

.login-header h1 {
    font-size: 2rem;
    font-weight: 700;
    color: var(--text-main);
}

.login-logo-row {
    text-align: center;
    margin-bottom: 40px;
}

.login-logo {
    height: 90px; /* Logo más grande según la imagen */
}

/* FORMULARIO */
.form-group {
    margin-bottom: 20px;
}

.form-group label {
    display: block;
    font-size: 0.9rem;
    font-weight: 600;
    margin-bottom: 8px;
    color: var(--text-main);
}

.input-wrapper {
    position: relative;
}

.input-wrapper input {
    width: 100%;
    padding: 14px 14px 14px 45px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: #FAFAFA;
    font-size: 0.95rem;
    outline: none;
}

.input-icon {
    position: absolute;
    left: 15px;
    top: 50%;
    transform: translateY(-50%);
    color: #CCC;
    font-size: 20px !important;
}

/* OPCIONES Y BOTÓN */
.login-options {
    text-align: right;
    margin-top: 10px;
    margin-bottom: 30px;
}

.forgot-link {
    color: var(--blue-login);
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 600;
}

.btn-login {
    width: 100%;
    padding: 16px;
    background-color: var(--blue-login);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 1.1rem;
    font-weight: 800;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: opacity 0.2s;
}

.btn-login:hover {
    opacity: 0.9;
}

.support-text {
    margin-top: 25px;
    text-align: center;
    font-size: 0.85rem;
    color: var(--text-muted);
}

.support-text a {
    color: #333;
    font-weight: 700;
    text-decoration: none;
}
.toggle-password {
    position: absolute;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-muted);
    display: flex;
    align-items: center;
}

.login-error {
    background-color: #ffebee;
    color: #c62828;
    padding: 12px;
    border-radius: 8px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.9rem;
}

/* RESPONSIVE */
@media (max-width: 1080) {
    .login-panel-left { display: none; }
    .login-panel-right { padding: 40px 30px; }
}
    </style>
    
</head>
<body class="login-body">

    <div class="login-wrapper">

        <!-- Tarjeta centrada -->
        <div class="login-card">

            <!-- Panel izquierdo: foto -->
            <div class="login-panel-left">
                <img src="{% static 'core/imagenes/login.jpeg' %}" alt="Mascotas" class="login-photo">
            </div>

            <!-- Panel derecho: formulario -->
            <div class="login-panel-right">

                <!-- Logo -->
                <div class="login-logo-row">
                    <img src="{% static 'core/imagenes/LOGO_ONEPET2.png' %}" alt="OnePet" class="login-logo">
                </div>

                <div class="login-header">
                    <h1>Bienvenido</h1>
                </div>

                <!-- Error de Django -->
                {% if form.errors %}
                <div class="login-error">
                    <span class="material-symbols-outlined">error</span>
                    <span>Usuario o contraseña incorrectos. Intenta de nuevo.</span>
                </div>
                {% endif %}

                <!-- Formulario -->
                <form method="post" action="{% url 'login' %}" class="login-form">
                    {% csrf_token %}

                    <div class="form-group">
                        <label for="id_username">Folio</label>
                        <div class="input-wrapper">
                            <span class="material-symbols-outlined input-icon">mail</span>
                            <input
                                type="text"
                                name="username"
                                id="id_username"
                                placeholder="nombre@veterinaria.com"
                                autocomplete="username"
                                required
                                value="{{ form.username.value|default:'' }}"
                            >
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="id_password">Contraseña</label>
                        <div class="input-wrapper">
                            <span class="material-symbols-outlined input-icon">lock</span>
                            <input
                                type="password"
                                name="password"
                                id="id_password"
                                placeholder="••••••••"
                                autocomplete="current-password"
                                required
                            >
                            <button type="button" class="toggle-password" onclick="togglePass()">
                                <span class="material-symbols-outlined" id="toggle-icon">visibility</span>
                            </button>
                        </div>
                    </div>

                    <div class="login-options">
                        <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
                    </div>

                    <button type="submit" class="btn-login">
                        Entrar <span class="material-symbols-outlined">login</span>
                    </button>

                    <input type="hidden" name="next" value="{{ next }}">
                </form>

                <p class="support-text">
                    ¿Problemas para acceder? <a href="#">Contactar soporte</a>
                </p>

            </div>
        </div>

    </div>

    <script>
        function togglePass() {
            const input = document.getElementById('id_password');
            const icon  = document.getElementById('toggle-icon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                input.type = 'password';
                icon.textContent = 'visibility';
            }
        }
    </script>

</body>
</html>
